/* ── Drag Reorder List ── */
function DragList({ items, renderItem, onReorder }) {
  const t = useT();
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);
  const [dragDelta, setDragDelta] = useState(0);
  const rowRefs = useRef([]);
  const dragState = useRef(null);

  const handleDragStart = (idx, e) => {
    e.preventDefault();
    const el = rowRefs.current[idx];
    if (!el) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    const rowHeight = el.getBoundingClientRect().height + 8; // include margin

    // Snapshot all original positions before any transforms
    const positions = rowRefs.current.map(r => {
      if (!r) return { top: 0, bottom: 0, mid: 0 };
      const rr = r.getBoundingClientRect();
      return { top: rr.top, bottom: rr.bottom, mid: rr.top + rr.height / 2 };
    });

    setDragIdx(idx);
    setOverIdx(idx);
    setDragDelta(0);
    dragState.current = { idx, startY: y, rowHeight, positions };

    const move = (ev) => {
      ev.preventDefault();
      const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
      setDragDelta(cy - y);
      // Use snapshotted positions to determine target slot
      const pos = dragState.current.positions;
      let target = dragState.current.idx;
      for (let i = 0; i < pos.length; i++) {
        if (i === dragState.current.idx) continue;
        if (cy >= pos[i].top && cy < pos[i].mid) { target = i; break; }
        if (cy >= pos[i].mid && cy <= pos[i].bottom) { target = i; break; }
      }
      // Also handle above first / below last
      if (pos.length > 0) {
        if (cy < pos[0].mid) target = 0;
        if (cy > pos[pos.length - 1].mid) target = pos.length - 1;
      }
      setOverIdx(target);
    };
    const up = () => {
      document.removeEventListener("touchmove", move);
      document.removeEventListener("touchend", up);
      document.removeEventListener("mousemove", move);
      document.removeEventListener("mouseup", up);
      const from = dragState.current?.idx;
      dragState.current = null;
      setDragDelta(0);
      setDragIdx(null);
      setOverIdx(prev => {
        if (prev !== null && prev !== from && from !== null) {
          setTimeout(() => onReorder(from, prev), 0);
        }
        return null;
      });
    };
    document.addEventListener("touchmove", move, { passive: false });
    document.addEventListener("touchend", up);
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
  };

  return <div style={{ position:"relative" }}>
    {items.map((item, idx) => {
      const isDragging = dragIdx === idx;
      const dragging = dragIdx !== null;
      let shift = 0;
      if (dragging && !isDragging && overIdx !== null && dragIdx !== null) {
        const rh = dragState.current?.rowHeight || 0;
        if (dragIdx < overIdx && idx > dragIdx && idx <= overIdx) shift = -rh;
        if (dragIdx > overIdx && idx < dragIdx && idx >= overIdx) shift = rh;
      }
      return <div key={item.id || idx} ref={el => rowRefs.current[idx] = el} style={{
        position: "relative",
        zIndex: isDragging ? 50 : 1,
        transform: isDragging
          ? `translateY(${dragDelta}px) scale(1.02)`
          : shift ? `translateY(${shift}px)` : "none",
        transition: isDragging ? "transform 0s, box-shadow 0.2s" : dragging ? "transform 0.25s cubic-bezier(.2,.8,.4,1)" : "none",
        boxShadow: isDragging ? "0 12px 40px rgba(0,0,0,0.25)" : "none",
        borderRadius: 12,
        opacity: isDragging ? 0.95 : 1,
        outline: isDragging ? `2px solid ${t.accent}` : "none",
        outlineOffset: isDragging ? -1 : 0,
      }}>
        {renderItem(item, idx, (e) => handleDragStart(idx, e))}
      </div>;
    })}
  </div>;
}

/* ── Sub-items checklist ── */
function SubItems({ items, onUpdate }) {
  const t = useT();
  const subs = items||[];
  const toggle = (idx) => { const n=[...subs]; n[idx]={...n[idx],done:!n[idx].done}; onUpdate(n); };
  const add = (text) => { onUpdate([...subs, {id:uid(),text,done:false}]); };
  const remove = (idx) => { onUpdate(subs.filter((_,i)=>i!==idx)); };
  const reorder = (from, to) => { const n=[...subs]; const [moved]=n.splice(from,1); n.splice(to,0,moved); onUpdate(n); };
  return <div style={{ padding:"6px 14px 10px",borderTop:`1px solid ${t.brd2}` }}>
    <DragList items={subs.map((s,i)=>({...s,_idx:i}))} onReorder={reorder} renderItem={(s, idx, onDragStart) => (
      <div style={{ display:"flex",alignItems:"center",gap:5,padding:"4px 0" }}>
        <button onClick={()=>toggle(s._idx)} style={{ background:"none",border:"none",fontSize:12,cursor:"pointer",color:s.done?"#30D158":"#999",padding:0,flexShrink:0,minWidth:20,minHeight:20,display:"flex",alignItems:"center",justifyContent:"center" }}>{s.done?"●":"○"}</button>
        <span style={{ fontSize:11,color:s.done?t.tx3:t.tx,textDecoration:s.done?"line-through":"none",flex:1 }}>{s.text}</span>
        <button onClick={()=>remove(s._idx)} style={{ background:"none",border:"none",color:t.tx3,fontSize:10,cursor:"pointer",padding:"2px 4px",flexShrink:0 }}>×</button>
        {onDragStart&&<div onTouchStart={e=>{e.stopPropagation();onDragStart(e);}} onMouseDown={e=>{e.stopPropagation();onDragStart(e);}} style={{
          flexShrink:0,padding:"3px 2px",cursor:"grab",touchAction:"none",userSelect:"none",WebkitUserSelect:"none",
          display:"flex",flexDirection:"column",gap:1,alignItems:"center",
        }}>
          <div style={{ display:"flex",gap:1.5 }}><div style={{ width:2,height:2,borderRadius:1,background:t.tx3 }}/><div style={{ width:2,height:2,borderRadius:1,background:t.tx3 }}/></div>
          <div style={{ display:"flex",gap:1.5 }}><div style={{ width:2,height:2,borderRadius:1,background:t.tx3 }}/><div style={{ width:2,height:2,borderRadius:1,background:t.tx3 }}/></div>
        </div>}
      </div>
    )}/>
    <div style={{ marginTop:4 }}>
      <input placeholder="+ Add sub-item" onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){add(e.target.value.trim());e.target.value="";}}} style={{ width:"100%",padding:"6px 8px",borderRadius:6,border:`1px solid ${t.brd}`,background:t.inpBg||t.card,color:t.tx,fontSize:11,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",outline:"none" }}/>
    </div>
  </div>;
}

/* ── Draggable Task List (for Matters tab reordering) ── */
function ReorderTaskList({ tasks: rawTasks, dealId, expTask, setExpTask, onCycle, onSetStatus, onEdit, onDel, onReorder }) {
  const t = useT(); const isDark = t.bg===T.dark.bg;
  const sorted = [...rawTasks].sort((a,b)=>(a.order||0)-(b.order||0));

  const handleReorder = (fromIdx, toIdx) => {
    const newArr = [...sorted];
    const [moved] = newArr.splice(fromIdx, 1);
    newArr.splice(toIdx, 0, moved);
    onReorder(dealId, newArr.map(t=>t.id));
  };

  return (
    <DragList items={sorted} onReorder={handleReorder} renderItem={(task, idx, onDragStart) => {
      const sts=STATUSES[task.status];
      const late=task.status!=="complete"&&daysUntil(task.deadline)!==null&&daysUntil(task.deadline)<0;
      const isExp=expTask===task.id;
      const flagged=task.flagged&&task.status!=="complete";
      return (
        <div style={{ borderBottom:`1px solid ${t.brd2}`,opacity:task.status==="complete"?.5:1,background:flagged?(isDark?"#1A0A10":"#FFF0F0"):late?t.overdue:t.card,borderLeft:flagged?`3px solid #FF3B30`:"none" }}>
          <div style={{ display:"flex",alignItems:"center",padding:"0" }}>
            <div onClick={()=>setExpTask(isExp?null:task.id)} style={{ flex:1,padding:"12px 12px 12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
              <button onClick={e=>{e.stopPropagation();onCycle(task.id);}} style={{ background:"none",border:"none",fontSize:22,cursor:"pointer",color:sts.color,padding:0,flexShrink:0,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center" }}>{sts.icon}</button>
              <div style={{ flex:1,minWidth:0 }}>
                <div style={{ fontSize:14,fontWeight:600,color:flagged?"#FF3B30":t.tx,textDecoration:task.status==="complete"?"line-through":"none", }}>{flagged?"🚩 ":""}{task.title}</div>
                <div style={{ display:"flex",gap:8,alignItems:"center",marginTop:3,flexWrap:"wrap" }}>
                  {task.assignee!=="Unassigned"&&<span style={{ fontSize:11,color:t.tx2 }}>{task.assignee}</span>}
                </div>
              </div>
              <div style={{ flexShrink:0 }}><DueBadge date={task.deadline}/></div>
            </div>
            {sorted.length>1&&<div onTouchStart={e=>{e.stopPropagation();onDragStart(e);}} onMouseDown={e=>{e.stopPropagation();onDragStart(e);}} style={{
              flexShrink:0,padding:"12px 12px 12px 4px",cursor:"grab",touchAction:"none",userSelect:"none",WebkitUserSelect:"none",
              display:"flex",flexDirection:"column",gap:2,alignItems:"center",
            }}>
              <div style={{ display:"flex",gap:2 }}><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/></div>
              <div style={{ display:"flex",gap:2 }}><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/></div>
              <div style={{ display:"flex",gap:2 }}><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/><div style={{ width:3,height:3,borderRadius:2,background:t.tx3 }}/></div>
            </div>}
          </div>
          {isExp&&<div style={{ padding:"0 16px 12px" }}>
            {task.notes&&<p style={{ fontSize:13,color:t.tx2,lineHeight:1.5,margin:"4px 0 10px" }}>{task.notes}</p>}
            <div style={{ display:"flex",gap:6,flexWrap:"wrap",marginBottom:12 }}>
              {Object.entries(STATUSES).map(([k,v])=>(
                <button key={k} onClick={()=>onSetStatus(task.id,k)} style={{
                  padding:"6px 12px",borderRadius:8,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
                  fontFamily:"'DM Sans',sans-serif",minHeight:32,display:"flex",alignItems:"center",gap:5,
                  background:task.status===k?`${v.color}20`:t.chip,color:task.status===k?v.color:t.tx3,
                  outline:task.status===k?`2px solid ${v.color}`:"none",
                }}><span style={{ fontSize:14 }}>{v.icon}</span>{v.label}</button>
              ))}
            </div>
            <div style={{ display:"flex",gap:8,justifyContent:"flex-end" }}>
              <button onClick={()=>onEdit(task)} style={{ background:t.btn2,border:"none",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:600,color:t.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:40 }}>Edit</button>
              <button onClick={()=>onDel(task.id)} style={{ background:t.danger,border:"none",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:600,color:t.dangerTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:40 }}>Delete</button>
            </div>
          </div>}
        </div>
      );
    }}/>
  );
}

/* ═══════════════════════════════════════════════════════════ */
/* ══ FORMS                                                  ══ */
/* ═══════════════════════════════════════════════════════════ */
function ClientForm({ client, onSave, onCancel }) {
  const t=useT(); const inp=useInp();
  const [name,setN]=useState(client?.name||"");
  return <div>
    <Label text="Client Name"><input style={inp} placeholder="e.g. Acme Corp" value={name} onChange={e=>setN(e.target.value)} autoFocus/></Label>
    <div style={{ display:"flex",gap:10,marginTop:8 }}>
      <button onClick={onCancel} style={{ flex:1,padding:14,background:t.btn2,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48 }}>Cancel</button>
      <button onClick={()=>name.trim()&&onSave(name.trim())} style={{ flex:1,padding:14,background:t.btn,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btnTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48,opacity:name.trim()?1:.4 }}>{client?"Save":"Add Client"}</button>
    </div>
  </div>;
}

function DealForm({ deal, clients, defClient, onSave, onCancel }) {
  const t=useT(); const inp=useInp(); const sel=useSel();
  const [name,setN]=useState(deal?.name||""); const [cid,setCid]=useState(deal?.clientId||defClient||clients[0]?.id||"");
  return <div>
    {!deal&&<Label text="Client"><select style={sel} value={cid} onChange={e=>setCid(e.target.value)}>{clients.length===0&&<option value="">No clients</option>}{[...clients].sort((a,b)=>{if(a.isAdmin&&!b.isAdmin)return -1;if(!a.isAdmin&&b.isAdmin)return 1;return a.name.localeCompare(b.name);}).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></Label>}
    <Label text="Matter Name"><input style={inp} placeholder="e.g. Series B Financing" value={name} onChange={e=>setN(e.target.value)} autoFocus/></Label>
    <div style={{ display:"flex",gap:10,marginTop:8 }}>
      <button onClick={onCancel} style={{ flex:1,padding:14,background:t.btn2,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48 }}>Cancel</button>
      <button onClick={()=>name.trim()&&(deal||cid)&&onSave(name.trim(),cid)} style={{ flex:1,padding:14,background:t.btn,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btnTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48,opacity:name.trim()?1:.4 }}>{deal?"Save":"Add Matter"}</button>
    </div>
  </div>;
}

function TaskForm({ task, clients, deals, associates, defClient, defDeal, defDeadline, onSave, onSaveTemplate, onCancel }) {
  const t=useT(); const inp=useInp(); const sel=useSel();
  const [title,setTitle]=useState(task?.title||"");
  const [notes,setNotes]=useState(task?.notes||"");
  const [sts,setSts]=useState(task?.status||"active");
  const [who,setWho]=useState(task?.assignee||"Unassigned");
  const [due,setDue]=useState(task?.deadline||defDeadline||"");
  const [tmplSaved,setTmplSaved]=useState(false);

  const initClient = task?.clientId||defClient||clients[0]?.id||"";
  const getMiscId = (cid) => deals.find(d=>d.clientId===cid&&d.isMisc)?.id||"";
  const initDeal = task?.dealId||defDeal||(initClient?getMiscId(initClient):"");

  const [cid,setCid]=useState(initClient);
  const [did,setDid]=useState(initDeal);

  const avail=deals.filter(d=>d.clientId===cid);
  const regularDeals=avail.filter(d=>!d.isMisc).sort((a,b)=>a.name.localeCompare(b.name));
  const miscDeal=avail.find(d=>d.isMisc);
  const sortedDeals=[...regularDeals,...(miscDeal?[miscDeal]:[])];

  const chgClient=v=>{
    setCid(v);
    // Default to Misc deal of new client
    const newMisc = deals.find(d=>d.clientId===v&&d.isMisc);
    setDid(newMisc?.id||"");
  };

  return <div>
    <Label text="Client"><select style={sel} value={cid} onChange={e=>chgClient(e.target.value)}>{clients.length===0&&<option value="">No clients</option>}{[...clients].sort((a,b)=>{if(a.isAdmin&&!b.isAdmin)return -1;if(!a.isAdmin&&b.isAdmin)return 1;return a.name.localeCompare(b.name);}).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></Label>
    <Label text="Matter"><select style={sel} value={did} onChange={e=>setDid(e.target.value)}>
      {sortedDeals.map(d=><option key={d.id} value={d.id}>{d.isMisc?"Miscellaneous":d.name}</option>)}
    </select></Label>
    <Label text="Task"><input style={inp} placeholder="e.g. Draft SPA" value={title} onChange={e=>setTitle(e.target.value)}/></Label>
    <Label text="Notes"><textarea style={{...inp,minHeight:56,resize:"vertical"}} placeholder="Additional context..." value={notes} onChange={e=>setNotes(e.target.value)}/></Label>
    <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
      <Label text="Status"><select style={sel} value={sts} onChange={e=>setSts(e.target.value)}>{Object.entries(STATUSES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></Label>
      <Label text="Current Owner"><select style={sel} value={who} onChange={e=>setWho(e.target.value)}>
        <option value="Unassigned">Unassigned</option>
        <option value="Client">Client</option>
        <option value="Counterparty">Counterparty</option>
        {associates.filter(a=>a!=="Unassigned").sort((a,b)=>a.localeCompare(b)).length>0&&<option disabled>──────</option>}
        {associates.filter(a=>a!=="Unassigned").sort((a,b)=>a.localeCompare(b)).map(a=><option key={a} value={a}>{a}</option>)}
      </select></Label>
      <Label text="Deadline">
        <div style={{ display:"flex",gap:8,alignItems:"center" }}>
          <input type="date" style={{...inp,flex:1,opacity:due==="N/A"?.35:1}} value={due==="N/A"?"":due} onChange={e=>{setDue(e.target.value);}} disabled={due==="N/A"}/>
          <button onClick={()=>setDue(due==="N/A"?"":"N/A")} style={{
            padding:"8px 12px",borderRadius:10,border:"none",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flexShrink:0,minHeight:40,
            background:due==="N/A"?`${t.tx3}20`:t.chip,color:due==="N/A"?t.tx:t.tx3,
          }}>N/A</button>
        </div>
      </Label>
    </div>
    <div style={{ display:"flex",gap:10,marginTop:8 }}>
      <button onClick={onCancel} style={{ flex:1,padding:14,background:t.btn2,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48 }}>Cancel</button>
      <button onClick={()=>title.trim()&&cid&&did&&onSave({title:title.trim(),notes:notes.trim(),status:sts,assignee:who,deadline:due,clientId:cid,dealId:did})} style={{ flex:1,padding:14,background:t.btn,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btnTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48,opacity:title.trim()&&cid&&did?1:.4 }}>{task?.id?"Save":"Add Task"}</button>
    </div>
    {onSaveTemplate&&title.trim()&&<button onClick={()=>{if(!tmplSaved){onSaveTemplate({title:title.trim(),notes:notes.trim(),assignee:who,clientId:cid,dealId:did});setTmplSaved(true);}}} style={{ width:"100%",padding:"10px",marginTop:8,background:tmplSaved?"#30D15815":"none",border:`1px dashed ${tmplSaved?"#30D158":t.brd}`,borderRadius:10,fontSize:12,fontWeight:600,color:tmplSaved?"#30D158":t.tx3,cursor:tmplSaved?"default":"pointer",fontFamily:"'DM Sans',sans-serif" }}>{tmplSaved?"★ Saved to Favorites":"★ Save as Favorite"}</button>}
  </div>;
}

function AssocForm({ onAdd, onClose }) {
  const t=useT(); const inp=useInp(); const sel=useSel();
  const [name,setN]=useState("");
  const [role,setRole]=useState("Associate");
  return <div>
    <Label text="Attorney Name"><input style={inp} placeholder="e.g. Sarah Chen" value={name} onChange={e=>setN(e.target.value)} autoFocus/></Label>
    <Label text="Designation"><select style={sel} value={role} onChange={e=>setRole(e.target.value)}>
      <option value="Partner">Partner</option>
      <option value="Counsel">Counsel</option>
      <option value="Associate">Associate</option>
    </select></Label>
    <div style={{ display:"flex",gap:10 }}>
      <button onClick={onClose} style={{ flex:1,padding:14,background:t.btn2,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48 }}>Done</button>
      <button onClick={()=>{if(name.trim()){onAdd(name.trim(),role);setN("");setRole("Associate");}}} style={{ flex:1,padding:14,background:t.btn,border:"none",borderRadius:12,fontSize:15,fontWeight:600,color:t.btnTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:48,opacity:name.trim()?1:.4 }}>Add</button>
    </div>
  </div>;
}


ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
