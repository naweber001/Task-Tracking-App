async function storageSet(data) {
  const json = JSON.stringify(data);
  try { localStorage.setItem(STORE_KEY, json); return true; } catch(e) {}
  return false;
}

async function storageGet() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };

function daysUntil(d) {
  if (!d || d==="N/A") return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((new Date(d+"T00:00:00") - now) / 86400000);
}

function DueBadge({ date }) {
  if (date==="N/A") return <span style={{ color:"#999",fontWeight:500,fontSize:10,fontFamily:"'JetBrains Mono',monospace" }}>N/A</span>;
  const d = daysUntil(date);
  if (d === null) return null;
  let c = "#6B7C8A";
  let l;
  if (d < 0) { c = "#FF3B30"; l = `${Math.abs(d)}d ago`; }
  else if (d === 0) { c = "#FF3B30"; l = "Today"; }
  else if (d === 1) { c = "#B8860B"; l = "Tmrw"; }
  else { l = new Date(date+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
  return <span style={{ color: c, fontWeight: d <= 1 ? 700 : 500, fontSize: 10, fontFamily: "'JetBrains Mono',monospace" }}>{l}</span>;
}

/* ── Month Calendar ── */
function MonthCal({ year, month, onPrev, onNext, tasks, reminders=[], selDate, onSelect }) {
  const t = useT();
  const DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  // Build deadline count map for this month
  const deadlineMap = {};
  tasks.forEach(tk => {
    if (!tk.deadline || tk.status==="complete") return;
    const [y,m] = tk.deadline.split("-").map(Number);
    if (y===year && m===month+1) {
      deadlineMap[tk.deadline] = (deadlineMap[tk.deadline]||0) + 1;
    }
  });

  // Build reminder map
  const reminderMap = {};
  reminders.forEach(r => {
    const [y,m] = r.date.split("-").map(Number);
    if (y===year && m===month+1) {
      reminderMap[r.date] = (reminderMap[r.date]||0) + 1;
    }
  });

  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  return (
    <div style={{ padding:"12px 16px 8px" }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
        <button onClick={onPrev} style={{ background:"none",border:"none",fontSize:18,color:t.tx2,cursor:"pointer",padding:"4px 12px",minHeight:36,minWidth:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8 }}>‹</button>
        <div style={{ fontSize:15,fontWeight:700,color:t.tx,fontFamily:"'DM Sans',sans-serif" }}>{MONTHS[month]} {year}</div>
        <button onClick={onNext} style={{ background:"none",border:"none",fontSize:18,color:t.tx2,cursor:"pointer",padding:"4px 12px",minHeight:36,minWidth:36,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:8 }}>›</button>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,textAlign:"center" }}>
        {DAYS.map(d=>(
          <div key={d} style={{ fontSize:10,fontWeight:700,color:t.tx3,padding:"4px 0",textTransform:"uppercase",letterSpacing:".04em" }}>{d}</div>
        ))}
        {cells.map((day,i) => {
          if (day===null) return <div key={`e${i}`}/>;
          const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const count = deadlineMap[dateStr]||0;
          const remCount = reminderMap[dateStr]||0;
          const isToday = dateStr===todayStr;
          const isSel = dateStr===selDate;
          const hasDeadlines = count>0;
          const hasReminders = remCount>0;

          return (
            <button key={dateStr} onClick={()=>onSelect(isSel?null:dateStr)} style={{
              background: isSel ? t.accent : isToday ? (t===T.dark?"rgba(123,147,255,.15)":"rgba(26,26,46,.08)") : "none",
              border:"none", borderRadius:8, padding:"6px 2px 4px", cursor:"pointer",
              display:"flex", flexDirection:"column", alignItems:"center", gap:1,
              minHeight:36, justifyContent:"center", position:"relative",
              WebkitTapHighlightColor:"transparent",
            }}>
              <span style={{
                fontSize:13, fontWeight:isToday||isSel?700:400,
                color: isSel ? "#fff" : isToday ? t.accent : (hasDeadlines||hasReminders) ? t.tx : t.tx3,
                fontFamily:"'JetBrains Mono',monospace",
              }}>{day}</span>
              {(hasDeadlines||hasReminders) && (
                <div style={{ display:"flex",gap:2,alignItems:"center",height:6 }}>
                  {hasDeadlines && (count<=3 ? Array.from({length:count}).map((_,j)=>(
                    <div key={`t${j}`} style={{ width:4,height:4,borderRadius:2,background:isSel?"rgba(255,255,255,.7)":"#FF3B30" }}/>
                  )) : (
                    <span style={{ fontSize:8,fontWeight:700,color:isSel?"rgba(255,255,255,.8)":"#FF3B30",fontFamily:"'JetBrains Mono',monospace" }}>{count}</span>
                  ))}
                  {hasReminders && <div style={{ width:4,height:4,borderRadius:2,background:isSel?"rgba(255,255,255,.7)":"#B8860B" }}/>}
                </div>
              )}
            </button>
          );
        })}
      </div>
      {selDate && (
        <button onClick={()=>onSelect(null)} style={{
          display:"block",margin:"8px auto 0",background:"none",border:"none",
          fontSize:12,color:t.accent,fontWeight:600,cursor:"pointer",padding:"4px 12px",
          fontFamily:"'DM Sans',sans-serif",
        }}>Clear date filter</button>
      )}
    </div>
  );
}

/* ── Sheet ── */
function Sheet({ open, onClose, title, children }) {
  const t = useT();
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:"fixed",inset:0,background:t.overlay,backdropFilter:"blur(4px)",display:"flex",flexDirection:"column",justifyContent:"flex-end",zIndex:1000 }}>
      <div onClick={e=>e.stopPropagation()} style={{ background:t.sheet,borderRadius:"20px 20px 0 0",maxHeight:"92vh",overflow:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,.2)",paddingBottom:"max(20px,env(safe-area-inset-bottom,20px))",WebkitOverflowScrolling:"touch" }}>
        <div style={{ display:"flex",justifyContent:"center",padding:"10px 0 4px" }}><div style={{ width:36,height:5,borderRadius:3,background:t.brd }}/></div>
        <div style={{ padding:"8px 20px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${t.brd2}` }}>
          <h2 style={{ margin:0,fontSize:18,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:t.tx }}>{title}</h2>

        </div>
        <div style={{ padding:"16px 20px 20px" }}>{children}</div>
      </div>

  );
}

function useInp() { const t = useT(); return { width:"100%",padding:"12px 14px",border:`1.5px solid ${t.inp}`,borderRadius:10,fontSize:16,fontFamily:"'DM Sans',sans-serif",color:t.tx,background:t.inpBg,outline:"none",boxSizing:"border-box",WebkitAppearance:"none" }; }
function useSel() { const s = useInp(); return { ...s,backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='10' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l5 6 5-6z' fill='%23888'/%3E%3C/svg%3E\")",backgroundRepeat:"no-repeat",backgroundPosition:"right 14px center",paddingRight:36 }; }

/* ── Confirm Button (tap once to arm, tap again to confirm) ── */
function ConfirmBtn({ label, confirmLabel, onConfirm, style: s }) {
  const [armed, setArmed] = useState(false);
  const timer = useRef(null);
  const arm = (e) => {
    if (e) e.stopPropagation();
    if (armed) { onConfirm(); setArmed(false); clearTimeout(timer.current); }
    else { setArmed(true); timer.current = setTimeout(()=>setArmed(false), 3000); }
  };
  useEffect(()=>()=>clearTimeout(timer.current),[]);
  return <button onClick={arm} style={{ ...s, ...(armed ? { background: s?.dangerBg || "#FFF0F0", color: s?.dangerTx || "#FF3B30" } : {}) }}>{armed ? (confirmLabel||"Confirm?") : label}</button>;
}

/* ── Quick Tasks (daily scratchpad with history) ── */
function QuickTasks({ allItems, viewDate, onViewDateChange, onAdd, onToggle, onDelete, onClear }) {
  const t = useT();
  const [val, setVal] = useState("");
  const today = todayStr();
  const isToday = viewDate===today;
  const items = allItems.filter(q=>q.date===viewDate);
  const pending = items.filter(i=>!i.done).length;
  const carriedOver = items.filter(i=>!i.done&&i.carriedOver);

  const allDates = [...new Set(allItems.map(q=>q.date))].sort();
  const curIdx = allDates.indexOf(viewDate);
  const hasPrev = curIdx>0 || (curIdx===-1 && allDates.length>0 && allDates[allDates.length-1]<viewDate);
  const hasNext = !isToday;

  const goPrev = () => { if (curIdx>0) onViewDateChange(allDates[curIdx-1]); else if (curIdx===-1 && allDates.length>0) { const prev = allDates.filter(d=>d<viewDate); if (prev.length) onViewDateChange(prev[prev.length-1]); }};
  const goNext = () => { if (curIdx>=0 && curIdx<allDates.length-1) onViewDateChange(allDates[curIdx+1]); else onViewDateChange(today); };
  const add = () => { if(val.trim()){ onAdd(val.trim()); setVal(""); }};
  const fmtDate = (d) => new Date(d+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});

  return (
    <div>
      {/* Date navigator */}
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,padding:"4px 0" }}>
        <button onClick={goPrev} disabled={!hasPrev} style={{ background:"none",border:"none",fontSize:18,color:hasPrev?t.tx2:t.tx3,cursor:hasPrev?"pointer":"default",padding:"4px 10px",opacity:hasPrev?1:.3,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center" }}>‹</button>
        <div style={{ textAlign:"center" }}>
          <span style={{ fontSize:13,fontWeight:600,color:isToday?t.accent:t.tx2 }}>{fmtDate(viewDate)}</span>
          {isToday&&<span style={{ fontSize:10,color:t.accent,marginLeft:6 }}>Today</span>}
          {!isToday&&<button onClick={()=>onViewDateChange(today)} style={{ background:`${t.accent}18`,border:"none",borderRadius:6,fontSize:10,fontWeight:600,color:t.accent,cursor:"pointer",padding:"2px 8px",marginLeft:6,fontFamily:"'DM Sans',sans-serif" }}>Go to today</button>}
        </div>
        <button onClick={goNext} disabled={!hasNext} style={{ background:"none",border:"none",fontSize:18,color:hasNext?t.tx2:t.tx3,cursor:hasNext?"pointer":"default",padding:"4px 10px",opacity:hasNext?1:.3,minWidth:36,minHeight:36,display:"flex",alignItems:"center",justifyContent:"center" }}>›</button>
      </div>

      {isToday&&<div style={{ display:"flex",gap:8,marginBottom:12 }}>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}}
          placeholder="Add a quick task..." autoFocus
          style={{ flex:1,padding:"10px 12px",border:`1.5px solid ${t.inp}`,borderRadius:10,fontSize:14,fontFamily:"'DM Sans',sans-serif",color:t.tx,background:t.inpBg,outline:"none",boxSizing:"border-box",WebkitAppearance:"none" }}/>
        <button onClick={add} style={{ background:t.accent,border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,padding:"10px 16px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flexShrink:0 }}>Add</button>
      </div>}

      {items.length===0&&<div style={{ fontSize:13,color:t.tx3,textAlign:"center",padding:"16px 0" }}>{isToday?"Jot down quick to-dos for today.":"No quick tasks on this day."}</div>}

      {isToday&&carriedOver.length>0&&<div style={{ fontSize:10,fontWeight:700,color:"#B8860B",textTransform:"uppercase",letterSpacing:".05em",padding:"4px 0 4px" }}>Carried over</div>}
      {isToday&&carriedOver.map(item=>(
        <div key={item.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${t.brd2}` }}>
          <button onClick={()=>onToggle(item.id)} style={{ background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#999",padding:0,flexShrink:0,minWidth:32,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center" }}>○</button>
          <span style={{ flex:1,fontSize:14,color:"#B8860B" }}>{item.text}</span>
          <button onClick={()=>onDelete(item.id)} style={{ background:"none",border:"none",color:t.tx3,fontSize:15,cursor:"pointer",padding:"4px 8px",borderRadius:4 }}>×</button>
        </div>
      ))}

      {isToday&&carriedOver.length>0&&items.filter(i=>!i.carriedOver||i.done).length>0&&<div style={{ fontSize:10,fontWeight:700,color:t.tx3,textTransform:"uppercase",letterSpacing:".05em",padding:"8px 0 4px" }}>Today</div>}
      {(isToday?items.filter(i=>!i.carriedOver||i.done):items).map(item=>(
        <div key={item.id} style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${t.brd2}` }}>
          {isToday?<button onClick={()=>onToggle(item.id)} style={{ background:"none",border:"none",fontSize:18,cursor:"pointer",color:item.done?"#30D158":"#999",padding:0,flexShrink:0,minWidth:32,minHeight:32,display:"flex",alignItems:"center",justifyContent:"center" }}>{item.done?"●":"○"}</button>
          :<span style={{ fontSize:18,color:item.done?"#30D158":"#999",flexShrink:0,minWidth:32,textAlign:"center" }}>{item.done?"●":"○"}</span>}
          <span style={{ flex:1,fontSize:14,color:item.done?t.tx3:t.tx,textDecoration:item.done?"line-through":"none" }}>{item.text}</span>
          {isToday&&<button onClick={()=>onDelete(item.id)} style={{ background:"none",border:"none",color:t.tx3,fontSize:15,cursor:"pointer",padding:"4px 8px",borderRadius:4 }}>×</button>}
        </div>
      ))}

      {isToday&&items.length>0&&items.every(i=>i.done)&&(
        <button onClick={onClear} style={{ width:"100%",padding:"10px",marginTop:10,background:"none",border:`1px dashed ${t.brd}`,borderRadius:10,fontSize:12,fontWeight:600,color:t.tx3,cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>Clear completed</button>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════ */
/* ══ MAIN APP                                               ══ */
/* ═══════════════════════════════════════════════════════════ */
function App() {
  const [clients, setClients] = useState([]);
  const [deals, setDeals] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [associates, setAssociates] = useState(["Unassigned"]);
  const [dark, setDark] = useState(false);
  const [loaded, setLoaded] = useState(false);

  const [view, setView] = useState("checklist");
  const [sheet, setSheet] = useState(null);
  const [showBackup, setShowBackup] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showArchive, setShowArchive] = useState(false);
  const [storageOk, setStorageOk] = useState(null);
  const [importText, setImportText] = useState("");
  const [editingTask, setEditingTask] = useState(null);
  const [editingClient, setEditingClient] = useState(null);
  const [editingDeal, setEditingDeal] = useState(null);
  const [expClients, setExpClients] = useState({});
  const [expDeals, setExpDeals] = useState({});
  const [expTask, setExpTask] = useState(null);
  const [menuTask, setMenuTask] = useState(null);
  const [expReminder, setExpReminder] = useState(null);
  const [expQuicky, setExpQuicky] = useState(null);
  const [menuQuicky, setMenuQuicky] = useState(null);
  const [editQuicky, setEditQuicky] = useState(null);
  const [filter, setFilter] = useState("all");
  const [sortBy, setSortBy] = useState("deadline");
  const [checklistView, setChecklistView] = useState("active");
  const [filterWeek, setFilterWeek] = useState(false);
  const [selDate, setSelDate] = useState(null); // "YYYY-MM-DD" or null
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [calYear, setCalYear] = useState(new Date().getFullYear());
  const [preClient, setPreClient] = useState(null);
  const [preDeal, setPreDeal] = useState(null);
  const [preDeadline, setPreDeadline] = useState("");
  const [selClient, setSelClient] = useState(null);
  const [selAssociate, setSelAssociate] = useState(null);
  const [teamTab, setTeamTab] = useState("tasks");
  const [clientTab, setClientTab] = useState("matters");
  const [calTab, setCalTab] = useState("tasks");
  const [calDate, setCalDate] = useState(null);
  const [assocSort, setAssocSort] = useState("name");
  const [showCompleted, setShowCompleted] = useState({});
  const [quickTasks, setQuickTasks] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [reminders, setReminders] = useState([]);
  const [teamRoles, setTeamRoles] = useState({});
  const [teamNotes, setTeamNotes] = useState({});
  const [clientNotes, setClientNotes] = useState({});
  const [showAssocNotes, setShowAssocNotes] = useState(false);
  const [qtViewDate, setQtViewDate] = useState(todayStr());

  const theme = dark ? T.dark : T.light;
  const data = useRef({ clients:[], deals:[], tasks:[], associates:["Unassigned"], dark:false, quickTasks:[], templates:[], reminders:[], teamRoles:{}, teamNotes:{}, clientNotes:{} });

  /* ── Persist helper ── */
  const save = async (upd) => {
    const next = { ...data.current, ...upd };
    data.current = next;
    if (upd.clients !== undefined) setClients(upd.clients);
    if (upd.deals !== undefined) setDeals(upd.deals);
    if (upd.tasks !== undefined) setTasks(upd.tasks);
    if (upd.associates !== undefined) setAssociates(upd.associates);
    if (upd.dark !== undefined) setDark(upd.dark);
    if (upd.quickTasks !== undefined) setQuickTasks(upd.quickTasks);
    if (upd.templates !== undefined) setTemplates(upd.templates);
    if (upd.reminders !== undefined) setReminders(upd.reminders);
    if (upd.teamRoles !== undefined) setTeamRoles(upd.teamRoles);
    if (upd.teamNotes !== undefined) setTeamNotes(upd.teamNotes);
    if (upd.clientNotes !== undefined) setClientNotes(upd.clientNotes);
    await storageSet(next);
  };

  /* ── Load on mount ── */
  useEffect(() => {
    (async () => {
      const d = await storageGet();
      if (d) {
        let cls = d.clients||[], dls = d.deals||[], tks = d.tasks||[];
        const assoc = d.associates||["Unassigned"];
        const dk = d.dark||false;
        // Migration: ensure every client has a Misc deal
        let changed = false;
        // Migration: ensure Administrative client exists
        if (!cls.find(c=>c.isAdmin)) {
          const admin = { id:uid(), name:"Administrative", isAdmin:true };
          cls = [...cls, admin];
          dls = [...dls, { id:uid(), name:"Miscellaneous", clientId:admin.id, isMisc:true }];
          changed = true;
        }
        cls.forEach(c => {
          if (!dls.find(dl => dl.clientId===c.id && dl.isMisc)) {
            dls = [...dls, { id:uid(), name:"Miscellaneous", clientId:c.id, isMisc:true }];
            changed = true;
          }
        });
        // Migration: move standalone tasks (no dealId) into their client's Misc deal
        tks = tks.map(t => {
          if (!t.dealId && t.clientId) {
            const misc = dls.find(dl => dl.clientId===t.clientId && dl.isMisc);
            if (misc) { changed = true; return { ...t, dealId: misc.id }; }
          }
          return t;
        });
        // Quick tasks: carry over incomplete from past dates to today, keep all history
        const today = todayStr();
        let qt = d.quickTasks||[];
        // Migrate old items without date
        qt = qt.map(q => q.date ? q : { ...q, date: today, carriedOver: false });
        // Carry over: for each incomplete past item, create a copy on today if not already there
        const todayIds = new Set(qt.filter(q=>q.date===today).map(q=>q.sourceId||q.id));
        const toCarry = qt.filter(q=>q.date!==today&&!q.done&&!todayIds.has(q.id));
        if (toCarry.length>0) {
          qt = [...qt, ...toCarry.map(q=>({id:uid(),text:q.text,done:false,date:today,carriedOver:true,sourceId:q.id}))];
          changed = true;
        }
        changed = changed || JSON.stringify(qt) !== JSON.stringify(d.quickTasks||[]);
        // Migration: map old statuses to new simplified statuses
        const statusMap = {pending:"active",in_progress:"active",review:"active",waiting:"hold",active:"active",hold:"hold",complete:"complete"};
        tks = tks.map(t=>{
          const mapped = statusMap[t.status]||"active";
          if(mapped!==t.status){changed=true;return{...t,status:mapped};}
          return t;
        });
        const s = { clients:cls, deals:dls, tasks:tks, associates:assoc, dark:dk, quickTasks:qt, templates:d.templates||[], reminders:d.reminders||[], teamRoles:d.teamRoles||{}, teamNotes:d.teamNotes||{}, clientNotes:d.clientNotes||{} };
        data.current = s;
        setClients(s.clients); setDeals(s.deals); setTasks(s.tasks);
        setAssociates(s.associates); setDark(s.dark); setQuickTasks(s.quickTasks); setTemplates(s.templates); setReminders(s.reminders); setTeamRoles(s.teamRoles); setTeamNotes(s.teamNotes); setClientNotes(s.clientNotes);
        const e = {}; s.clients.forEach(c => e[c.id]=true); setExpClients(e);
        if (changed) await storageSet(s);
      } else {
        // First launch: create Administrative client
        const admin = { id:uid(), name:"Administrative", isAdmin:true };
        const misc = { id:uid(), name:"Miscellaneous", clientId:admin.id, isMisc:true };
        const s = { clients:[admin], deals:[misc], tasks:[], associates:["Unassigned"], dark:false, quickTasks:[], templates:[], reminders:[], teamRoles:{}, teamNotes:{}, clientNotes:{} };
        data.current = s;
        setClients(s.clients); setDeals(s.deals);
        await storageSet(s);
      }
      setLoaded(true);
      // Test storage
      const diag = [];
      let ok = false;
      // Test persistent
      try {
        await window.storage.set("__test__", "1", false);
        const rd = await window.storage.get("__test__", false);
        if (rd && rd.value === "1") { ok = true; diag.push("Persistent storage: ✓"); }
        else diag.push("Persistent storage: ✗ (read failed)");
        try { await window.storage.delete("__test__", false); } catch(e){}
      } catch(e) { diag.push("Persistent storage: ✗ (" + e.message + ")"); }
      // Test localStorage
      try {
        localStorage.setItem("__test__", "1");
        const v = localStorage.getItem("__test__");
        if (v === "1") { if(!ok) ok = true; diag.push("localStorage: ✓"); }
        else diag.push("localStorage: ✗");
        localStorage.removeItem("__test__");
      } catch(e) { diag.push("localStorage: ✗ (" + e.message + ")"); }
      setStorageOk(ok);
    })();
  }, []);

  /* ── CRUD ── */
  const addClient = (name) => {
    const c = { id:uid(), name };
    const misc = { id:uid(), name:"Miscellaneous", clientId:c.id, isMisc:true };
    save({ clients:[...data.current.clients, c], deals:[...data.current.deals, misc] });
    setExpClients(e=>({...e,[c.id]:true}));
    setSheet(null);
  };
  const updateClient = (id,name) => {
    save({ clients: data.current.clients.map(x=>x.id===id?{...x,name}:x) });
    setSheet(null); setEditingClient(null);
  };
  const deleteClient = (id) => {
    const cl = data.current.clients.find(x=>x.id===id);
    if (cl?.isAdmin) return;
    save({ clients:data.current.clients.filter(x=>x.id!==id), deals:data.current.deals.filter(x=>x.clientId!==id), tasks:data.current.tasks.filter(x=>x.clientId!==id) });
    if (selClient===id) setSelClient(null);
  };
  const addDeal = (name,clientId) => {
    const d = { id:uid(), name, clientId };
    save({ deals:[...data.current.deals, d] });
    setExpDeals(e=>({...e,[d.id]:true}));
    setSheet(null);
  };
  const deleteDeal = (id) => {
    const deal = data.current.deals.find(x=>x.id===id);
    if (deal?.isMisc) return;
    save({ deals:data.current.deals.filter(x=>x.id!==id), tasks:data.current.tasks.filter(x=>x.dealId!==id) });
  };
  const updateDeal = (id,name) => {
    save({ deals: data.current.deals.map(x=>x.id===id?{...x,name}:x) });
    setSheet(null); setEditingDeal(null);
  };
  const saveTask = (td) => {
    if (editingTask && editingTask.id) {
      save({ tasks: data.current.tasks.map(x=>x.id===editingTask.id?{...x,...td}:x) });
    } else {
      save({ tasks:[...data.current.tasks, { id:uid(), createdAt:new Date().toISOString(), ...td }] });
    }
    setSheet(null); setEditingTask(null); setPreDeadline("");
  };
  const deleteTask = (id) => { save({ tasks:data.current.tasks.filter(x=>x.id!==id) }); setExpTask(null); };
  const cycleStatus = (id) => {
    const o = ["active","hold","complete"];
    save({ tasks: data.current.tasks.map(x=>x.id!==id?x:{...x,status:o[(o.indexOf(x.status)+1)%o.length]}) });
  };
  const setStatus = (id,status) => {
    save({ tasks: data.current.tasks.map(x=>x.id!==id?x:{...x,status,completedAt:status==="complete"?new Date().toISOString():undefined}) });
  };
  const toggleFlag = (id) => {
    save({ tasks: data.current.tasks.map(x=>x.id!==id?x:{...x,flagged:!x.flagged}) });
  };
  const updateTaskSubs = (id, subItems) => {
    save({ tasks: data.current.tasks.map(x=>x.id!==id?x:{...x,subItems}) });
  };
  const updateQuickySubs = (id, subItems) => {
    save({ quickTasks: data.current.quickTasks.map(x=>x.id!==id?x:{...x,subItems}) });
  };
  const reorderTasks = (dealId, orderedIds) => {
    // Assign order values based on new arrangement
    const orderMap = {};
    orderedIds.forEach((id,i) => orderMap[id]=i);
    save({ tasks: data.current.tasks.map(x=>x.dealId===dealId&&orderMap[x.id]!==undefined?{...x,order:orderMap[x.id]}:x) });
  };
  const addAssociate = (n,role) => { if(n&&!data.current.associates.includes(n)) save({associates:[...data.current.associates,n],teamRoles:{...data.current.teamRoles,[n]:role||"Associate"}}); };
  const removeAssociate = (n) => {
    if(n==="Unassigned") return;
    save({ associates:data.current.associates.filter(x=>x!==n), tasks:data.current.tasks.map(x=>x.assignee===n?{...x,assignee:"Unassigned"}:x) });
  };

  const togClient = id => setExpClients(e=>({...e,[id]:!e[id]}));
  const togDeal = id => setExpDeals(e=>({...e,[id]:!e[id]}));
  const filt = t => {
    if (filter!=="all"&&t.status!==filter) return false;
    if (selDate&&t.deadline!==selDate) return false;
    if (filterWeek&&t.deadline) {
      const now = new Date(); now.setHours(0,0,0,0);
      const day = now.getDay(); const diff = day===0?6:day-1;
      const monStart = new Date(now); monStart.setDate(now.getDate()-diff);
      const sunEnd = new Date(monStart); sunEnd.setDate(monStart.getDate()+6);
      const td = new Date(t.deadline+"T00:00:00");
      if (td<monStart||td>sunEnd) return false;
    }
    if (filterWeek&&!t.deadline) return false;
    return true;
  };
  // Checklist filter: includes all statuses (completed shown faded at bottom)
  const checklistFilt = t => filt(t);
  const getMisc = (clientId) => deals.find(d=>d.clientId===clientId&&d.isMisc);

  const sortedClients = [...clients].sort((a,b)=>{
    if (a.isAdmin&&!b.isAdmin) return -1;
    if (!a.isAdmin&&b.isAdmin) return 1;
    return a.name.localeCompare(b.name);
  });

  // Active deals: have ≥1 incomplete task
  const activeDealSet = new Set(deals.filter(d=>{
    const dt=tasks.filter(t=>t.dealId===d.id);
    return dt.some(t=>t.status!=="complete");
  }).map(d=>d.id));
  const activeTasks = tasks.filter(t=>!t.dealId||activeDealSet.has(t.dealId));
  const totalT = activeTasks.length;
  const doneT = activeTasks.filter(t=>t.status==="complete").length;
  const overdueT = activeTasks.filter(t=>t.status!=="complete"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).length;
  const waitingT = activeTasks.filter(t=>t.status==="hold").length;
  const adminClient = clients.find(c=>c.isAdmin);
  const adminT = adminClient?activeTasks.filter(t=>t.clientId===adminClient.id&&t.status!=="complete").length:0;

  if (!loaded) return (
    <div style={{ height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif",color:"#999" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>Loading...</div>
  );

  return (
    <Ctx.Provider value={theme}>
    <div style={{ fontFamily:"'DM Sans',sans-serif",color:theme.tx,background:theme.bg,height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden",maxWidth:480,margin:"0 auto" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

      {/* ── HEADER ── */}
      <div style={{ padding:"12px 20px 10px",background:theme.hdr,flexShrink:0,paddingTop:"max(12px,env(safe-area-inset-top,12px))",borderBottom:dark?`1px solid ${theme.brd}`:"none" }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <img src={dark?LOGO_DARK:LOGO_LIGHT} alt="FIRM" style={{ width:32,height:32,minWidth:32,minHeight:32,borderRadius:6,flexShrink:0 }}/>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:6 }}>
            {view==="clients"&&selClient&&(
              <button onClick={()=>setSelClient(null)} style={{ background:dark?theme.chip:"rgba(255,255,255,.15)",border:"none",borderRadius:16,color:dark?theme.tx2:"rgba(255,255,255,.8)",fontSize:12,fontWeight:600,padding:"6px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>← Back</button>
            )}
            {view==="team"&&selAssociate&&(
              <button onClick={()=>setSelAssociate(null)} style={{ background:dark?theme.chip:"rgba(255,255,255,.15)",border:"none",borderRadius:16,color:dark?theme.tx2:"rgba(255,255,255,.8)",fontSize:12,fontWeight:600,padding:"6px 12px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>← Back</button>
            )}
            <button onClick={()=>setSheet("search")} style={{ background:"none",border:"none",cursor:"pointer",padding:6,display:"flex",alignItems:"center",justifyContent:"center",minWidth:32,minHeight:32,borderRadius:8,WebkitTapHighlightColor:"transparent" }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={dark?theme.tx2:"rgba(255,255,255,.8)"} strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
            </button>
          </div>
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{ flex:1,overflow:"auto",WebkitOverflowScrolling:"touch" }}>

        {/* ═══ CHECKLIST ═══ */}
        {view==="checklist"&&(
          <div style={{ display:"flex",flexDirection:"column",height:"100%" }}>

            {/* Fixed top section */}
            <div style={{ flexShrink:0,background:theme.bg }}>

            {/* Checklist header + action buttons */}
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 16px 0",marginBottom:12 }}>
              <h3 style={{ margin:0,fontSize:16,fontWeight:700,color:theme.tx }}>Checklist</h3>
              <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                <button onClick={()=>{setPreClient(null);setPreDeal(null);setPreDeadline(todayStr());setEditingTask(null);setSheet("task");}} style={{ background:theme.btn,border:"none",borderRadius:20,color:theme.btnTx,fontSize:13,fontWeight:600,padding:"9px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Task</button>
                <button onClick={()=>setSheet("quickTask")} style={{ background:theme.btn,border:"none",borderRadius:20,color:theme.btnTx,fontSize:13,fontWeight:600,padding:"9px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Quicky</button>
              </div>
            </div>

            {/* Row 2: Active / Hold / Admin toggle */}
            <div style={{ padding:"4px 16px 2px",display:"flex",gap:0,background:theme.chip,borderRadius:10,margin:"0 16px 4px" }}>
              {[{k:"active",l:"Active",c:null,clr:"#FF3B30",tx:"#fff"},{k:"hold",l:"Hold",c:waitingT,clr:"#FFCC00",tx:"#1A1A2E"},{k:"admin",l:"Admin",c:adminT,clr:"#30D158",tx:"#fff"}].map(({k,l,c,clr,tx:btx})=>(
                <button key={k} onClick={()=>setChecklistView(k)} style={{
                  flex:1,padding:"8px 0",border:"none",borderRadius:8,fontSize:12,fontWeight:700,
                  background:checklistView===k?clr:"transparent",
                  color:checklistView===k?btx:theme.tx3,
                  cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s",
                  textTransform:"uppercase",letterSpacing:".04em",
                }}>{l}{c>0&&<span style={{ marginLeft:3,fontSize:9,fontWeight:700,background:checklistView===k?"rgba(0,0,0,.15)":clr,color:clr==="#FFCC00"?"#1A1A2E":"#fff",borderRadius:8,padding:"1px 5px",minWidth:14,display:"inline-block",textAlign:"center" }}>{c}</span>}</button>
              ))}
            </div>

            {/* Row 3: Sort + Today + Filter */}
            <div style={{ padding:"4px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{ border:"none",background:"none",fontSize:12,color:theme.accent,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",padding:"4px 0" }}>
                <option value="deadline">Sort: Deadline</option>
                <option value="client">Sort: Client</option>
                <option value="custom">Sort: Custom</option>
              </select>
              <button onClick={()=>{if(selDate===todayStr()){setSelDate(null);}else{setSelDate(todayStr());setFilterWeek(false);}}} style={{
                border:"none",borderRadius:12,padding:"4px 10px",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                background:selDate===todayStr()?"#FF3B30":"#FF3B3018",color:selDate===todayStr()?"#fff":"#FF3B30",
              }}>Today</button>
              <div style={{ display:"flex",alignItems:"center",gap:6 }}>
                {selDate&&selDate!==todayStr()&&<button onClick={()=>setSelDate(null)} style={{ border:"none",background:`#B8860B20`,borderRadius:12,padding:"3px 8px",fontSize:10,fontWeight:700,color:"#B8860B",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:3 }}>{selDate.slice(5)} ×</button>}
                {filterWeek&&<button onClick={()=>setFilterWeek(false)} style={{ border:"none",background:`${theme.accent}18`,borderRadius:12,padding:"3px 8px",fontSize:10,fontWeight:700,color:theme.accent,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:3 }}>This Week ×</button>}
                {filter!=="all"&&<button onClick={()=>setFilter("all")} style={{ border:"none",background:`${theme.accent}18`,borderRadius:12,padding:"3px 8px",fontSize:10,fontWeight:700,color:theme.accent,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:3 }}>{STATUSES[filter]?.label} ×</button>}
                <select value="__display__" onChange={e=>{
                  const v=e.target.value;
                  if(v==="__none__"){setFilter("all");setFilterWeek(false);setSelDate(null);}
                  else if(v==="__thisWeek__"){setFilterWeek(!filterWeek);setSelDate(null);}
                  else{setFilter(v==="all"?"all":v);}
                }} style={{ border:"none",background:"none",fontSize:12,color:theme.accent,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",padding:"4px 0",textAlign:"right" }}>
                  <option value="__display__" disabled>Filter: {filter!=="all"?(STATUSES[filter]?.label||""):(filterWeek?"This Week":"None")}</option>
                  <option value="__none__">Clear All Filters</option>
                  <option disabled>── Status ──</option>
                  {Object.entries(STATUSES).map(([k,v])=>(
                    <option key={k} value={k}>{v.label}{filter===k?" ✓":""}</option>
                  ))}
                  <option disabled>── Time ──</option>
                  <option value="__thisWeek__">{filterWeek?"✓ ":""}This Week</option>
                </select>
              </div>
            </div>

            {/* End fixed top section */}
            </div>

            {/* Scrollable task list */}
            <div style={{ flex:1,overflow:"auto",WebkitOverflowScrolling:"touch",paddingBottom:100 }}>

            {(()=>{
              const sortFn = (a,b) => {
                // Flagged items always first
                if(a.flagged&&!b.flagged) return -1; if(!a.flagged&&b.flagged) return 1;
                if(sortBy==="custom") return (a.checklistOrder||0)-(b.checklistOrder||0);
                if(sortBy==="deadline"){ if(!a.deadline||a.deadline==="N/A") return 1; if(!b.deadline||b.deadline==="N/A") return -1; const dc=a.deadline.localeCompare(b.deadline); if(dc!==0) return dc; }
                if(sortBy==="client"){ const ca=clients.find(c=>c.id===a.clientId)?.name||""; const cb=clients.find(c=>c.id===b.clientId)?.name||""; const cc=ca.localeCompare(cb); if(cc!==0) return cc; }
                return (a.checklistOrder||0)-(b.checklistOrder||0);
              };
              const adminId = clients.find(c=>c.isAdmin)?.id;
              const filtered = activeTasks.filter(checklistFilt).filter(t=>{
                if(checklistView==="hold") return t.status==="hold";
                if(checklistView==="admin") return t.clientId===adminId&&t.status!=="hold";
                return t.status!=="hold"&&t.clientId!==adminId;
              });
              const overdue = filtered.filter(t=>t.status!=="hold"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).sort(sortFn);
              const dueToday = filtered.filter(t=>t.status!=="hold"&&daysUntil(t.deadline)===0).sort(sortFn);
              const dueTomorrow = filtered.filter(t=>t.status!=="hold"&&daysUntil(t.deadline)===1).sort(sortFn);
              const dueLater = filtered.filter(t=>t.status!=="hold"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)>1).sort(sortFn);
              const noDate = filtered.filter(t=>t.status!=="hold"&&(daysUntil(t.deadline)===null)).sort(sortFn);
              const holdTasks = filtered.filter(t=>t.status==="hold").sort(sortFn);
              const todayQT = quickTasks.filter(q=>q.date===todayStr());

              const allActiveTasks = [...overdue,...dueToday,...dueTomorrow,...dueLater,...noDate];
              const hasContent = checklistView==="hold"?holdTasks.length>0:checklistView==="admin"?allActiveTasks.length>0:(allActiveTasks.length>0||todayQT.length>0);

              if(!hasContent) return (
                <div style={{ textAlign:"center",padding:"60px 20px",color:theme.tx2 }}>
                  <div style={{ fontSize:40,marginBottom:12 }}>{checklistView==="hold"?"◷":checklistView==="admin"?"⚙":"📋"}</div>
                  <div style={{ fontSize:16,fontWeight:600,color:theme.tx }}>{checklistView==="hold"?"No tasks on hold":checklistView==="admin"?"No admin tasks":clients.length===0?"No clients yet":"No active tasks"}</div>
                  <div style={{ fontSize:13,marginTop:6 }}>{checklistView==="hold"?"Tasks set to 'Hold' will appear here.":checklistView==="admin"?"Tasks under Administrative will appear here.":clients.length===0?"Head to the Matters tab to get started.":"All caught up!"}</div>
                </div>
              );

              const reorderSection = (section, fromIdx, toIdx) => {
                const newArr = [...section];
                const [moved] = newArr.splice(fromIdx, 1);
                newArr.splice(toIdx, 0, moved);
                const orderMap = {};
                newArr.forEach((t, i) => orderMap[t.id] = i);
                save({ tasks: data.current.tasks.map(t => orderMap[t.id] !== undefined ? { ...t, checklistOrder: orderMap[t.id] } : t) });
                setSortBy("custom");
              };

              const renderSection = (section, hideDue) => <DragList items={section} onReorder={(from,to)=>reorderSection(section,from,to)} renderItem={(task, idx, onDragStart) => {
                const cl = clients.find(c=>c.id===task.clientId);
                const dl = deals.find(d=>d.id===task.dealId);
                return <FlatTaskRow key={task.id} task={task} clientName={cl?.name} dealName={dl?.isMisc?null:dl?.name}
                  exp={expTask===task.id} onTog={()=>{setExpTask(expTask===task.id?null:task.id);setMenuTask(null);}}
                  menu={menuTask===task.id} onTogMenu={()=>{setMenuTask(menuTask===task.id?null:task.id);setExpTask(null);}}
                  onSetStatus={s=>setStatus(task.id,s)}
                  onToggleFlag={()=>toggleFlag(task.id)}
                  onEdit={()=>{setEditingTask(task);setSheet("editTask");}}
                  onDel={()=>deleteTask(task.id)}
                  onUpdateSubs={subs=>updateTaskSubs(task.id,subs)}
                  onDragStart={onDragStart}
                  hideDue={hideDue}/>;
              }}/>;

              if(checklistView==="hold") return <div style={{ padding:"0 16px" }}>
                {renderSection(holdTasks,true)}
              </div>;

              if(checklistView==="admin") return <div style={{ padding:"0 16px" }}>
                {[
                  {items:[...overdue,...dueToday].sort(sortFn),label:`Today (${overdue.length+dueToday.length})`,color:"#FF3B30",hd:true},
                  {items:dueTomorrow,label:`Tomorrow (${dueTomorrow.length})`,color:"#B8860B",hd:true},
                  {items:dueLater,label:`Upcoming (${dueLater.length})`,color:theme.accent,hd:false},
                  {items:noDate,label:`No Date (${noDate.length})`,color:theme.tx3,hd:true},
                ].filter(g=>g.items.length>0).map(g=>(
                  <div key={g.label} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                      {g.dot&&<div style={{ width:8,height:8,borderRadius:4,background:g.color }}/>}
                      <span style={{ fontSize:11,fontWeight:700,color:g.color,textTransform:"uppercase",letterSpacing:".05em" }}>{g.label}</span>
                    </div>
                    {renderSection(g.items,g.hd)}
                  </div>
                ))}
              </div>;

              return <div style={{ padding:"0 16px" }}>
                {(()=>{
                  // Build unified Today list: quickies + overdue + dueToday tasks
                  const undoneQT = todayQT.filter(q=>!q.done).map(q=>({...q,_type:"quicky"}));
                  const doneQT = todayQT.filter(q=>q.done);
                  const todayTasks = [...overdue,...dueToday].sort(sortFn).map(t=>({...t,_type:"task"}));
                  const todayAll = [...undoneQT,...todayTasks].sort((a,b)=>{
                    if(a.flagged&&!b.flagged) return -1; if(!a.flagged&&b.flagged) return 1;
                    return (a.checklistOrder||a.quickOrder||0)-(b.checklistOrder||b.quickOrder||0);
                  });
                  const todayCount = todayAll.length + doneQT.length;

                  const reorderMixed = (fromIdx, toIdx) => {
                    const newArr = [...todayAll];
                    const [moved] = newArr.splice(fromIdx, 1);
                    newArr.splice(toIdx, 0, moved);
                    const taskOrder = {}, quickOrder = {};
                    newArr.forEach((item, i) => {
                      if(item._type==="task") taskOrder[item.id] = i;
                      else quickOrder[item.id] = i;
                    });
                    const updates = {};
                    if(Object.keys(taskOrder).length) {
                      updates.tasks = data.current.tasks.map(t=>taskOrder[t.id]!==undefined?{...t,checklistOrder:taskOrder[t.id]}:t);
                    }
                    if(Object.keys(quickOrder).length) {
                      updates.quickTasks = data.current.quickTasks.map(q=>quickOrder[q.id]!==undefined?{...q,quickOrder:quickOrder[q.id]}:q);
                    }
                    save(updates);
                    setSortBy("custom");
                  };

                  const renderMixedItem = (item, idx, onDragStart) => {
                    if(item._type==="quicky") {
                      const q = item; const qFlag = q.flagged;
                      const isExp = expQuicky === q.id;
                      const isMenu = menuQuicky === q.id;
                      const isEdit = editQuicky === q.id;
                      const subs = q.subItems||[];
                      return (
                        <div style={{ background:qFlag?(dark?"#1A0A10":"#FFF0F0"):theme.card,borderRadius:8,marginBottom:4,boxShadow:theme.cardShadow,border:qFlag?"1px solid #FF3B30":theme.cardBorder,borderLeft:qFlag?`3px solid #FF3B30`:undefined,overflow:"hidden",transition:"all .2s" }}>
                          <div onClick={()=>{setExpQuicky(isExp?null:q.id);setMenuQuicky(null);setEditQuicky(null);}} style={{ padding:"7px 8px 7px 10px",display:"flex",alignItems:"center",gap:4,cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
                            <button onClick={e=>{e.stopPropagation();save({quickTasks:data.current.quickTasks.map(x=>x.id===q.id?{...x,done:true}:x)});}} style={{ background:"none",border:"none",fontSize:14,cursor:"pointer",color:qFlag?"#FF3B30":"#999",padding:0,flexShrink:0,minWidth:24,minHeight:24,display:"flex",alignItems:"center",justifyContent:"center" }}>○</button>
                            <div style={{ flex:1,minWidth:0 }}>
                              <div style={{ fontSize:12,fontWeight:600,color:qFlag?"#FF3B30":q.carriedOver?"#B8860B":theme.tx }}>{qFlag?"🚩 ":""}{q.text}{subs.length>0&&<span style={{ fontSize:10,color:theme.tx3,marginLeft:4 }}>({subs.filter(s=>s.done).length}/{subs.length})</span>}</div>
                            </div>
                            <button onClick={e=>{e.stopPropagation();save({quickTasks:data.current.quickTasks.map(x=>x.id===q.id?{...x,flagged:!x.flagged}:x)});}} style={{ background:"none",border:"none",fontSize:12,cursor:"pointer",color:qFlag?"#FF3B30":theme.tx3,padding:"2px 4px",flexShrink:0,minWidth:22,minHeight:24,display:"flex",alignItems:"center",justifyContent:"center" }}>{qFlag?"🚩":"🏳"}</button>
                            <button onClick={e=>{e.stopPropagation();setMenuQuicky(isMenu?null:q.id);setExpQuicky(null);}} style={{ background:"none",border:"none",fontSize:11,cursor:"pointer",color:theme.tx3,padding:"2px 4px",flexShrink:0,minWidth:22,minHeight:24,display:"flex",alignItems:"center",justifyContent:"center" }}>🖊️</button>
                            {onDragStart&&<div onTouchStart={e=>{e.stopPropagation();onDragStart(e);}} onMouseDown={e=>{e.stopPropagation();onDragStart(e);}} style={{
                              flexShrink:0,marginLeft:1,padding:"4px 2px",cursor:"grab",touchAction:"none",userSelect:"none",WebkitUserSelect:"none",
                              display:"flex",flexDirection:"column",gap:1,alignItems:"center",
                            }}>
                              <div style={{ display:"flex",gap:1.5 }}><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/></div>
                              <div style={{ display:"flex",gap:1.5 }}><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/></div>
                              <div style={{ display:"flex",gap:1.5 }}><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/><div style={{ width:2,height:2,borderRadius:1,background:theme.tx3 }}/></div>
                            </div>}
                          </div>
                          {isMenu&&<div style={{ padding:"6px 12px 10px",borderTop:`1px solid ${theme.brd2}` }}>
                            {isEdit?<div>
                              <input autoFocus defaultValue={q.text} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value.trim()){save({quickTasks:data.current.quickTasks.map(x=>x.id===q.id?{...x,text:e.target.value.trim()}:x)});setEditQuicky(null);setMenuQuicky(null);}}} style={{ width:"100%",padding:8,borderRadius:6,border:`1px solid ${theme.brd}`,background:theme.inpBg||theme.card,color:theme.tx,fontSize:13,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box" }}/>
                            </div>:<div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>
                              <button onClick={()=>setEditQuicky(q.id)} style={{ background:theme.btn2,border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:600,color:theme.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>Edit</button>
                              <ConfirmBtn label="Delete" confirmLabel="Sure?" onConfirm={()=>{save({quickTasks:data.current.quickTasks.filter(x=>x.id!==q.id)});setMenuQuicky(null);}} style={{ background:theme.danger,border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:600,color:theme.dangerTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}/>
                            </div>}
                          </div>}
                          {isExp&&<SubItems items={subs} onUpdate={s=>updateQuickySubs(q.id,s)}/>}
                        </div>
                      );
                    }
                    // Task
                    const task = item;
                    const cl = clients.find(c=>c.id===task.clientId);
                    const dl = deals.find(d=>d.id===task.dealId);
                    return <FlatTaskRow key={task.id} task={task} clientName={cl?.name} dealName={dl?.isMisc?null:dl?.name}
                      exp={expTask===task.id} onTog={()=>{setExpTask(expTask===task.id?null:task.id);setMenuTask(null);}}
                      menu={menuTask===task.id} onTogMenu={()=>{setMenuTask(menuTask===task.id?null:task.id);setExpTask(null);}}
                      onSetStatus={s=>setStatus(task.id,s)}
                      onToggleFlag={()=>toggleFlag(task.id)}
                      onEdit={()=>{setEditingTask(task);setSheet("editTask");}}
                      onDel={()=>deleteTask(task.id)}
                      onUpdateSubs={subs=>updateTaskSubs(task.id,subs)}
                      onDragStart={onDragStart}
                      hideDue={true}/>;
                  };

                  return <>
                    {todayCount>0&&<div style={{ marginBottom:12 }}>
                      <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                        <span style={{ fontSize:11,fontWeight:700,color:"#FF3B30",textTransform:"uppercase",letterSpacing:".05em" }}>Today ({todayCount})</span>
                      </div>
                      {todayAll.length>0&&<DragList items={todayAll} onReorder={reorderMixed} renderItem={renderMixedItem}/>}
                      {doneQT.map(q=>(
                        <div key={q.id} style={{ display:"flex",alignItems:"center",gap:4,padding:"7px 8px 7px 10px",marginBottom:4,background:theme.card,borderRadius:8,boxShadow:theme.cardShadow,border:theme.cardBorder,opacity:.4,transition:"opacity .3s" }}>
                          <button onClick={()=>save({quickTasks:data.current.quickTasks.map(x=>x.id===q.id?{...x,done:false}:x)})} style={{ background:"none",border:"none",fontSize:14,cursor:"pointer",color:"#30D158",padding:0,flexShrink:0,minWidth:24,minHeight:24,display:"flex",alignItems:"center",justifyContent:"center" }}>●</button>
                          <div style={{ flex:1,minWidth:0 }}>
                            <div style={{ fontSize:12,fontWeight:600,color:theme.tx3,textDecoration:"line-through" }}>{q.text}</div>
                          </div>
                        </div>
                      ))}
                    </div>}
                  </>;
                })()}
                {[
                  {items:dueTomorrow,label:`Tomorrow (${dueTomorrow.length})`,color:"#B8860B",hd:true},
                  {items:dueLater,label:`Upcoming (${dueLater.length})`,color:theme.accent,hd:false},
                  {items:noDate,label:`No Date (${noDate.length})`,color:theme.tx3,hd:true},
                ].filter(g=>g.items.length>0).map(g=>(
                  <div key={g.label} style={{ marginBottom:12 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                      {g.dot&&<div style={{ width:8,height:8,borderRadius:4,background:g.color }}/>}
                      <span style={{ fontSize:11,fontWeight:700,color:g.color,textTransform:"uppercase",letterSpacing:".05em" }}>{g.label}</span>
                    </div>
                    {renderSection(g.items,g.hd)}
                  </div>
                ))}
              </div>;
            })()}
            </div>
          </div>
        )}

        {/* ═══ CLIENTS ═══ */}
        {view==="clients"&&!selClient&&(
          <div style={{ padding:"16px 16px 100px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
              <h3 style={{ margin:0,fontSize:16,fontWeight:700,color:theme.tx }}>Matters</h3>
              <button onClick={()=>setSheet("client")} style={{ background:theme.btn,border:"none",borderRadius:20,color:theme.btnTx,fontSize:13,fontWeight:600,padding:"9px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Client</button>
            </div>
            {clients.length===0?(
              <div style={{ textAlign:"center",padding:"48px 20px",color:theme.tx2 }}>
                <div style={{ fontSize:40,marginBottom:12 }}>💲</div>
                <div style={{ fontSize:16,fontWeight:600,color:theme.tx }}>No clients yet</div>
                <div style={{ fontSize:13,marginTop:4 }}>Tap "+ Client" to add one.</div>
              </div>
            ):sortedClients.map(cl=>{
              const cd=deals.filter(d=>d.clientId===cl.id);
              const ct=tasks.filter(t=>t.clientId===cl.id);
              const dn=ct.filter(t=>t.status==="complete").length;
              const od=ct.filter(t=>t.status!=="complete"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).length;
              return (
                <div key={cl.id} onClick={()=>{setSelClient(cl.id);setClientTab("matters");}} style={{ background:theme.card,borderRadius:14,padding:"16px 18px",marginBottom:10,border:"none",boxShadow:theme.cardShadow,cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                    <div><div style={{ fontSize:15,fontWeight:700,color:theme.tx }}>{cl.name}</div>
                      <div style={{ fontSize:12,color:theme.tx2,marginTop:3,display:"flex",gap:10 }}>
                        <span>{cd.length} matter{cd.length!==1?"s":""}</span><span>{dn}/{ct.length} tasks</span>
                        {od>0&&<span style={{ color:"#FF3B30",fontWeight:700 }}>{od} overdue</span>}
                        {ct.length>0&&dn===ct.length&&<span style={{ color:"#30D158",fontWeight:700 }}>✓ All caught up</span>}
                      </div>
                    </div>
                    <span style={{ color:theme.tx3,fontSize:16 }}>›</span>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {view==="clients"&&selClient&&(()=>{
          const cl=clients.find(c=>c.id===selClient);
          if(!cl) return <div style={{ padding:20,color:theme.tx2 }}>Client not found.</div>;
          const allDeals=deals.filter(d=>d.clientId===cl.id);
          const regularDeals=allDeals.filter(d=>!d.isMisc).sort((a,b)=>a.name.localeCompare(b.name));
          const miscDeal=allDeals.find(d=>d.isMisc);
          const sortedDeals=[...regularDeals,...(miscDeal?[miscDeal]:[])];
          const ct=tasks.filter(t=>t.clientId===cl.id);
          const dn=ct.filter(t=>t.status==="complete").length;
          return (
            <div style={{ padding:"16px 16px 100px" }}>
              <div style={{ background:theme.card,borderRadius:14,padding:20,border:"none",boxShadow:theme.cardShadow,marginBottom:16 }}>
                <div style={{ fontSize:20,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:theme.tx }}>{cl.name}</div>
                {cl.isAdmin&&<div style={{ fontSize:12,color:theme.tx2,marginTop:2,fontStyle:"italic" }}>Internal & administrative tasks</div>}
                <div style={{ fontSize:13,color:theme.tx2,marginTop:6,display:"flex",gap:16 }}>
                  <span>{allDeals.length} matter{allDeals.length!==1?"s":""}</span><span>{ct.length} task{ct.length!==1?"s":""}</span><span>{dn} complete</span>
                </div>
                {!cl.isAdmin&&<div style={{ display:"flex",gap:10,marginTop:16 }}>
                  <button onClick={()=>{setEditingClient(cl);setSheet("editClient");}} style={{ flex:1,padding:12,background:theme.btn2,border:"none",borderRadius:10,fontSize:14,fontWeight:600,color:theme.btn2Tx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:44 }}>Rename</button>
                  <ConfirmBtn label="Delete" confirmLabel="Tap to confirm" onConfirm={()=>deleteClient(cl.id)} style={{ flex:1,padding:12,background:theme.danger,border:"none",borderRadius:10,fontSize:14,fontWeight:600,color:theme.dangerTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:44 }}/>
                </div>}
              </div>

              {/* Matters / Notes toggle */}
              <div style={{ display:"flex",gap:0,background:theme.chip,borderRadius:10,marginBottom:12,padding:4 }}>
                {[{k:"matters",l:"Matters"},{k:"notes",l:"Notes"}].map(({k,l})=>(
                  <button key={k} onClick={()=>setClientTab(k)} style={{
                    flex:1,padding:"8px 0",border:"none",borderRadius:8,fontSize:12,fontWeight:700,
                    background:clientTab===k?theme.btn:"transparent",
                    color:clientTab===k?theme.btnTx:theme.tx3,
                    cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s",
                    textTransform:"uppercase",letterSpacing:".04em",
                  }}>{l}</button>
                ))}
              </div>

              {clientTab==="notes"&&<div>
                <textarea
                  defaultValue={clientNotes[cl.id]||""}
                  onBlur={e=>{const v=e.target.value;save({clientNotes:{...data.current.clientNotes,[cl.id]:v}});}}
                  placeholder={`Notes about ${cl.name}...`}
                  style={{ width:"100%",minHeight:160,padding:14,borderRadius:12,border:`1px solid ${theme.brd}`,background:theme.card,color:theme.tx,fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",resize:"vertical",outline:"none",lineHeight:1.6 }}/>
                <div style={{ fontSize:11,color:theme.tx3,marginTop:4 }}>Saves automatically when you tap away.</div>
              </div>}

              {clientTab==="matters"&&<>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
                <h3 style={{ margin:0,fontSize:14,fontWeight:700,color:theme.tx2,textTransform:"uppercase",letterSpacing:".05em" }}>Matters</h3>
                <button onClick={()=>{setPreClient(cl.id);setSheet("deal");}} style={{ background:theme.chip,border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:600,color:theme.chipTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Matter</button>
              </div>
              {/* Show completed toggle */}
              {dn>0&&<button onClick={()=>setShowCompleted(s=>({...s,[cl.id]:!s[cl.id]}))} style={{
                display:"flex",alignItems:"center",gap:6,padding:"8px 12px",marginBottom:10,
                background:showCompleted[cl.id]?`${"#30D158"}15`:theme.chip,border:"none",borderRadius:8,
                fontSize:12,fontWeight:600,color:showCompleted[cl.id]?"#30D158":theme.tx3,
                cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
              }}>{showCompleted[cl.id]?"● Hide":"○ Show"} completed ({dn})</button>}
              {sortedDeals.map(deal=>{
                const dtAll=tasks.filter(t=>t.dealId===deal.id);
                const dt=showCompleted[cl.id]?dtAll:dtAll.filter(t=>t.status!=="complete");
                const dd=dtAll.filter(t=>t.status==="complete").length;
                const dOpen=expDeals[deal.id];
                return (<div key={deal.id} style={{ background:theme.card,borderRadius:12,marginBottom:8,border:"none",boxShadow:theme.cardShadow,overflow:"hidden" }}>
                  <div onClick={()=>togDeal(deal.id)} style={{ padding:"14px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
                    <span style={{ fontSize:10,color:theme.tx3,transition:"transform .2s",transform:dOpen?"rotate(90deg)":"rotate(0)",flexShrink:0 }}>▶</span>
                    <div style={{ flex:1,minWidth:0 }}>
                      <div style={{ fontSize:15,fontWeight:600,color:deal.isMisc?theme.tx2:theme.tx,fontStyle:deal.isMisc?"italic":"normal" }}>{deal.name}</div>
                      <div style={{ fontSize:12,color:theme.tx2,marginTop:2 }}>{dd}/{dtAll.length} tasks complete</div>
                    </div>
                    {!deal.isMisc&&<div style={{ display:"flex",gap:4,flexShrink:0 }}>
                      <button onClick={e=>{e.stopPropagation();setEditingDeal(deal);setSheet("editDeal");}} style={{ background:"none",border:"none",color:theme.tx2,fontSize:12,fontWeight:600,cursor:"pointer",padding:"8px 10px",borderRadius:8,fontFamily:"'DM Sans',sans-serif",minHeight:36 }}>Edit</button>
                      <ConfirmBtn label="Delete" confirmLabel="Confirm?" onConfirm={()=>deleteDeal(deal.id)} style={{ background:"none",border:"none",color:theme.dangerTx,fontSize:12,fontWeight:600,cursor:"pointer",padding:"8px 10px",borderRadius:8,fontFamily:"'DM Sans',sans-serif",minHeight:36 }}/>
                    </div>}
                  </div>
                  {dOpen&&<div style={{ borderTop:`1px solid ${theme.brd2}` }}>
                    {dt.length>0?<ReorderTaskList tasks={dt} dealId={deal.id} expTask={expTask} setExpTask={setExpTask}
                      onCycle={cycleStatus} onSetStatus={setStatus}
                      onEdit={task=>{setEditingTask(task);setSheet("editTask");}}
                      onDel={deleteTask} onReorder={reorderTasks}/>
                    :<div style={{ padding:"14px 16px",fontSize:13,color:theme.tx3,fontStyle:"italic" }}>{showCompleted[cl.id]?"No tasks yet.":"No active tasks."}</div>}
                    <button onClick={()=>{setPreClient(cl.id);setPreDeal(deal.id);setPreDeadline(todayStr());setEditingTask(null);setSheet("task");}} style={{ display:"flex",alignItems:"center",gap:6,padding:"12px 16px",background:"none",border:"none",color:theme.accent,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:"100%",minHeight:44,borderTop:`1px solid ${theme.brd2}` }}>+ Add Task</button>
                  </div>}
                </div>);
              })}
              {ct.length>0&&dn===ct.length&&(
                <div style={{ textAlign:"center",padding:"24px 20px",marginTop:8 }}>
                  <div style={{ fontSize:28,marginBottom:8 }}>🎉</div>
                  <div style={{ fontSize:15,fontWeight:700,color:"#30D158" }}>All Caught Up!</div>
                  <div style={{ fontSize:12,color:theme.tx2,marginTop:4 }}>Every task for {cl.name} is complete.</div>
                </div>
              )}
              </>}
            </div>
          );
        })()}

        {/* ═══ TEAM ═══ */}
        {view==="team"&&!selAssociate&&(
          <div style={{ padding:"16px 16px 100px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
              <h3 style={{ margin:0,fontSize:16,fontWeight:700,color:theme.tx }}>Team</h3>
              <button onClick={()=>setSheet("associate")} style={{ background:theme.btn,border:"none",borderRadius:20,color:theme.btnTx,fontSize:13,fontWeight:600,padding:"9px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Attorney</button>
            </div>
            {associates.filter(a=>a!=="Unassigned").length>1&&<div style={{ marginBottom:10 }}>
              <select value={assocSort} onChange={e=>setAssocSort(e.target.value)} style={{ border:"none",background:"none",fontSize:12,color:theme.accent,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor:"pointer",padding:"4px 0" }}>
                <option value="name">Sort: Name</option>
                <option value="tasks">Sort: Most Tasks</option>
                <option value="active">Sort: Most Active</option>
                <option value="overdue">Sort: Most Overdue</option>
              </select>
            </div>}
            {associates.filter(a=>a!=="Unassigned").length===0?(
              <div style={{ textAlign:"center",padding:"48px 20px",color:theme.tx2 }}><div style={{ fontSize:32,marginBottom:8 }}>👥</div><div style={{ fontSize:16,fontWeight:600,color:theme.tx }}>No Attorneys Yet</div><div style={{ fontSize:13,marginTop:4 }}>Tap "+ Attorney" to add one.</div></div>
            ):[...associates.filter(a=>a!=="Unassigned")].sort((a,b)=>{
              const aTasks=tasks.filter(t=>t.assignee===a); const bTasks=tasks.filter(t=>t.assignee===b);
              const aActive=aTasks.filter(t=>t.status!=="complete").length; const bActive=bTasks.filter(t=>t.status!=="complete").length;
              const aOd=aTasks.filter(t=>t.status!=="complete"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).length;
              const bOd=bTasks.filter(t=>t.status!=="complete"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).length;
              if(assocSort==="name") return a.localeCompare(b);
              if(assocSort==="tasks") return bTasks.length-aTasks.length;
              if(assocSort==="active") return bActive-aActive;
              if(assocSort==="overdue") return bOd-aOd;
              return 0;
            }).map(name=>{
              const at=tasks.filter(t=>t.assignee===name); const p=at.filter(t=>t.status!=="complete").length; const od=at.filter(t=>t.status!=="complete"&&daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).length;
              return (<div key={name} onClick={()=>{setSelAssociate(name);setTeamTab("tasks");}} style={{ background:theme.card,borderRadius:14,padding:"16px 18px",marginBottom:8,border:"none",boxShadow:theme.cardShadow,cursor:"pointer",WebkitTapHighlightColor:"transparent" }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <div><div style={{ fontSize:15,fontWeight:700,color:theme.tx }}>{name}{teamRoles[name]&&<span style={{ fontSize:11,fontWeight:500,color:theme.tx2,marginLeft:6 }}>{teamRoles[name]}</span>}</div><div style={{ fontSize:12,color:theme.tx2,marginTop:3,display:"flex",gap:10 }}><span>{at.length} total</span><span>{p} active</span>{od>0&&<span style={{ color:"#FF3B30",fontWeight:700 }}>{od} overdue</span>}</div></div>
                  <span style={{ color:theme.tx3,fontSize:16 }}>›</span>
                </div>
              </div>);
            })}
          </div>
        )}

        {/* ── Associate drill-down ── */}
        {view==="team"&&selAssociate&&(()=>{
          const at=tasks.filter(t=>t.assignee===selAssociate);
          const active=at.filter(t=>t.status!=="complete");
          const completed=at.filter(t=>t.status==="complete");
          const overdue=active.filter(t=>daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0).sort((a,b)=>a.deadline.localeCompare(b.deadline));
          const upcoming=active.filter(t=>!(daysUntil(t.deadline)!==null&&daysUntil(t.deadline)<0)).sort((a,b)=>{if(!a.deadline)return 1;if(!b.deadline)return -1;return a.deadline.localeCompare(b.deadline);});
          return (
            <div style={{ padding:"16px 16px 100px" }}>
              <div style={{ background:theme.card,borderRadius:14,padding:"18px 20px",border:"none",boxShadow:theme.cardShadow,marginBottom:16 }}>
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <div>
                    <div style={{ fontSize:20,fontWeight:700,fontFamily:"'DM Sans',sans-serif",color:theme.tx }}>{selAssociate}{teamRoles[selAssociate]&&<span style={{ fontSize:13,fontWeight:500,color:theme.tx2,marginLeft:8 }}>{teamRoles[selAssociate]}</span>}</div>
                    <div style={{ fontSize:13,color:theme.tx2,marginTop:4,display:"flex",gap:16 }}>
                      <span>{active.length} active</span>
                      <span>{completed.length} completed</span>
                      {overdue.length>0&&<span style={{ color:"#FF3B30",fontWeight:700 }}>{overdue.length} overdue</span>}
                    </div>
                  </div>
                  <ConfirmBtn label="Remove" confirmLabel="Confirm?" onConfirm={()=>{removeAssociate(selAssociate);setSelAssociate(null);}} style={{ background:theme.danger,border:"none",borderRadius:10,padding:"8px 14px",fontSize:12,fontWeight:600,color:theme.dangerTx,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",minHeight:36 }}/>
                </div>
              </div>

              {/* Tasks / Notes toggle */}
              <div style={{ display:"flex",gap:0,background:theme.chip,borderRadius:10,marginBottom:12,padding:4 }}>
                {[{k:"tasks",l:"Tasks"},{k:"notes",l:"Notes"}].map(({k,l})=>(
                  <button key={k} onClick={()=>setTeamTab(k)} style={{
                    flex:1,padding:"8px 0",border:"none",borderRadius:8,fontSize:12,fontWeight:700,
                    background:teamTab===k?theme.btn:"transparent",
                    color:teamTab===k?theme.btnTx:theme.tx3,
                    cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s",
                    textTransform:"uppercase",letterSpacing:".04em",
                  }}>{l}</button>
                ))}
              </div>

              {teamTab==="notes"&&<div>
                <textarea
                  defaultValue={teamNotes[selAssociate]||""}
                  onBlur={e=>{const v=e.target.value;save({teamNotes:{...data.current.teamNotes,[selAssociate]:v}});}}
                  placeholder={`Notes about ${selAssociate}...`}
                  style={{ width:"100%",minHeight:160,padding:14,borderRadius:12,border:`1px solid ${theme.brd}`,background:theme.card,color:theme.tx,fontSize:14,fontFamily:"'DM Sans',sans-serif",boxSizing:"border-box",resize:"vertical",outline:"none",lineHeight:1.6 }}/>
                <div style={{ fontSize:11,color:theme.tx3,marginTop:4 }}>Saves automatically when you tap away.</div>
              </div>}

              {teamTab==="tasks"&&<>
              {active.length===0&&completed.length===0&&(
                <div style={{ textAlign:"center",padding:"40px 20px",color:theme.tx2 }}>
                  <div style={{ fontSize:14,fontWeight:600,color:theme.tx }}>No tasks assigned</div>
                  <div style={{ fontSize:13,marginTop:4 }}>Assign tasks to {selAssociate} from the Checklist or Matters tab.</div>
                </div>
              )}

              {overdue.length>0&&<div style={{ marginBottom:12 }}>
                <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:8 }}>
                  <div style={{ width:8,height:8,borderRadius:4,background:"#FF3B30" }}/>
                  <span style={{ fontSize:11,fontWeight:700,color:"#FF3B30",textTransform:"uppercase",letterSpacing:".05em" }}>Overdue ({overdue.length})</span>
                </div>
                {overdue.map(task=>{
                  const cl=clients.find(c=>c.id===task.clientId);
                  const dl=deals.find(d=>d.id===task.dealId);
                  return <FlatTaskRow key={task.id} task={task} clientName={cl?.name} dealName={dl?.isMisc?null:dl?.name}
                    exp={expTask===task.id} onTog={()=>setExpTask(expTask===task.id?null:task.id)}
                    onSetStatus={s=>setStatus(task.id,s)}
                    onEdit={()=>{setEditingTask(task);setSheet("editTask");}}
                    onDel={()=>deleteTask(task.id)}/>;
                })}
              </div>}

              {upcoming.length>0&&<div>
                {overdue.length>0&&<div style={{ fontSize:11,fontWeight:700,color:theme.tx3,textTransform:"uppercase",letterSpacing:".05em",marginBottom:8 }}>Active</div>}
                {upcoming.map(task=>{
                  const cl=clients.find(c=>c.id===task.clientId);
                  const dl=deals.find(d=>d.id===task.dealId);
                  return <FlatTaskRow key={task.id} task={task} clientName={cl?.name} dealName={dl?.isMisc?null:dl?.name}
                    exp={expTask===task.id} onTog={()=>setExpTask(expTask===task.id?null:task.id)}
                    onSetStatus={s=>setStatus(task.id,s)}
                    onEdit={()=>{setEditingTask(task);setSheet("editTask");}}
                    onDel={()=>deleteTask(task.id)}/>;
                })}
              </div>}

              {completed.length>0&&<div style={{ marginTop:12 }}>
                <button onClick={()=>setShowCompleted(s=>({...s,["__team__"]:!s["__team__"]}))} style={{
                  display:"flex",alignItems:"center",gap:6,padding:"8px 12px",marginBottom:10,
                  background:showCompleted["__team__"]?`${"#30D158"}15`:theme.chip,border:"none",borderRadius:8,
                  fontSize:12,fontWeight:600,color:showCompleted["__team__"]?"#30D158":theme.tx3,
                  cursor:"pointer",fontFamily:"'DM Sans',sans-serif",
                }}>{showCompleted["__team__"]?"● Hide":"○ Show"} completed ({completed.length})</button>
                {showCompleted["__team__"]&&completed.map(task=>{
                  const cl=clients.find(c=>c.id===task.clientId);
                  const dl=deals.find(d=>d.id===task.dealId);
                  return <FlatTaskRow key={task.id} task={task} clientName={cl?.name} dealName={dl?.isMisc?null:dl?.name}
                    exp={expTask===task.id} onTog={()=>setExpTask(expTask===task.id?null:task.id)}
                    onSetStatus={s=>setStatus(task.id,s)}
                    onEdit={()=>{setEditingTask(task);setSheet("editTask");}}
                    onDel={()=>deleteTask(task.id)}/>;
                })}
              </div>}
              </>}
            </div>
          );
        })()}

        {/* ═══ CALENDAR ═══ */}
        {view==="calendar"&&(
          <div style={{ padding:"16px 16px 100px" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16 }}>
              <h3 style={{ margin:0,fontSize:16,fontWeight:700,color:theme.tx }}>Calendar</h3>
              <button onClick={()=>setSheet("reminder")} style={{ background:theme.btn,border:"none",borderRadius:20,color:theme.btnTx,fontSize:13,fontWeight:600,padding:"9px 18px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif" }}>+ Reminder</button>
            </div>
            <MonthCal year={calYear} month={calMonth} tasks={activeTasks} reminders={reminders} selDate={calDate}
              onSelect={d=>{setCalDate(calDate===d?null:d);}}
              onPrev={()=>{ if(calMonth===0){setCalMonth(11);setCalYear(calYear-1);}else setCalMonth(calMonth-1); }}
              onNext={()=>{ if(calMonth===11){setCalMonth(0);setCalYear(calYear+1);}else setCalMonth(calMonth+1); }}
            />

            {/* Selected date header */}
            {calDate&&<div style={{ padding:"10px 0 4px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ fontSize:13,fontWeight:700,color:theme.tx }}>{new Date(calDate+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
              <button onClick={()=>setCalDate(null)} style={{ background:theme.btn2,border:"none",borderRadius:12,fontSize:10,fontWeight:700,color:theme.btn2Tx,cursor:"pointer",padding:"4px 10px",fontFamily:"'DM Sans',sans-serif" }}>Clear</button>
            </div>}

            {/* Tasks / Reminders toggle */}
            <div style={{ display:"flex",gap:0,background:theme.chip,borderRadius:10,marginTop:10,marginBottom:12,padding:4 }}>
              {[{k:"tasks",l:"Tasks"},{k:"reminders",l:"Reminders"}].map(({k,l})=>(
                <button key={k} onClick={()=>setCalTab(k)} style={{
                  flex:1,padding:"8px 0",border:"none",borderRadius:8,fontSize:12,fontWeight:700,
                  background:calTab===k?theme.btn:"transparent",
                  color:calTab===k?theme.btnTx:theme.tx3,
                  cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .2s",
                  textTransform:"uppercase",letterSpacing:".04em",
                }}>{l}</button>
              ))}
            </div>

            {/* Tasks view */}
            {calTab==="tasks"&&(()=>{
              const calTasks = calDate
                ? activeTasks.filter(t=>t.deadline===calDate)
                : activeTasks.filter(t=>t.status!=="complete"&&t.deadline&&daysUntil(t.deadline)<=7&&daysUntil(t.deadline)>=0).sort((a,b)=>a.deadline.localeCompare(b.deadline));
              const label = calDate?"Tasks due this date":"Tasks due within 7 days";
              return <div>
                <div style={{ fontSize:11,fontWeight:700,color:"#FF3B30",textTransform:"uppercase",letterSpacing:".05em",marginBottom:6 }}>
                  {label}{calTasks.length>0&&` (${calTasks.length})`}
                </div>
                {calTasks.length===0&&<div style={{ textAlign:"center",padding:"24px 0",color:theme.tx3,fontSize:13 }}>{calDate?"No tasks due this date":"No tasks due in the next 7 days"}</div>}
                {calTasks.map(task=>{
                  const cl=clients.find(c=>c.id===task.clientId);
                  const done=task.status==="complete";
                  const flagged=task.flagged&&!done;
